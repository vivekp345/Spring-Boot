<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="app">

        <h1>User Profile</h1>

        <!-- 🧱 Flex layout -->
        <div class="content">

            <!-- Main Card -->
            <div class="card">
                <img src="img_avatar.png" alt="Avatar" id="Image">

                <div class="container">
                    <h3 id="Name">John Doe</h3>
                    <p id="Email">john@gmail.com</p>
                </div>
            </div>

            <!-- Random Image beside -->
            <div id="randomImage"></div>

        </div>

        <div class="buttons">
            <button class="btn primary" onclick="change()">Toggle User</button>
            <button class="btn secondary" onclick="Random()">Random User</button>
        </div>

    </div>

    <script src="./site.js"></script>
</body>

</html>
